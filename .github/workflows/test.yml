name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: extractions/setup-just@v3
      - name: linecache tests (FANOUT=4)
        run: just lc
      - name: linecache tests (FANOUT=8)
        run: just lc8
      - name: piecetab tests
        run: just pt

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: extractions/setup-just@v3
      - name: install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov
      - name: linecache coverage
        run: just lc-cov
      - name: piecetab coverage
        run: just pt-cov
